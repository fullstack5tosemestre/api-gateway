name: Gateway Deploy

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "src/**"
  workflow_dispatch:

env:
  ECS_CLUSTER: smartlogix-cluster1
  ECS_SERVICE: gateway-service
  TASK_FAMILY: task-gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build JAR
        run: |
          chmod +x ./mvnw
          ./mvnw clean package

      - name: Build Docker image
        run: |
          docker build -t api-gateway:latest .
          docker tag api-gateway:latest ${{ secrets.ECR_REPO_URL_API_GATEWAY }}:latest

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL_API_GATEWAY }}:latest

      - name: Render task definition
        env:
          ECR_REPO_URL_API_GATEWAY: ${{ secrets.ECR_REPO_URL_API_GATEWAY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ALB_DNS_NAME: ${{ secrets.ALB_DNS_NAME }}
          INTERNAL_ALB_DNS: ${{ secrets.INTERNAL_ALB_DNS }}
        run: |
          export LAB_ROLE_ARN="arn:aws:iam::$(aws sts get-caller-identity --query Account --output text):role/LabRole"
          envsubst '$ECR_REPO_URL_API_GATEWAY $AWS_REGION $ALB_DNS_NAME $INTERNAL_ALB_DNS $LAB_ROLE_ARN' \
            < aws/taskdef-gateway.json > taskdef.json

      - name: Register task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://taskdef.json \
            --query 'taskDefinition.{family:family,revision:revision}'

      - name: Deploy to ECS
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition $TASK_FAMILY \
              --force-new-deployment \
              --query 'service.{service:serviceName,taskDefinition:taskDefinition}'
            echo "Waiting for service to stabilize..."
            aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE
          else
            echo "Service $ECS_SERVICE does not exist yet."
            echo "Image was pushed. Create the service following AWS_SETUP.md, then this step will deploy on the next run."
          fi
